# =============================================================================
# TEST MANIFEST — TRT-LLM via NIM (Path A — pre-compiled NGC container)
# Deploy directly: kubectl apply -f benchmark-job-nim-test.yaml
#
# Model:  meta/llama-3.1-8b-instruct  (~16 GB fp16, fits on RTX 4000 Ada)
# GPU:    RTX 4000 Ada Generation
# Engine: TRT-LLM Path A — NIM container (no build step, no weight conversion)
#
# How NIM differs from Path B:
#   - No trtllm-build initContainer — NIM ships with a pre-compiled TRT-LLM
#     engine baked in, optimised for the target GPU at image build time.
#   - No convert_checkpoint.py — model weights are bundled or downloaded
#     automatically by the NIM entrypoint on first run.
#   - Server is ready much faster — typically 2–5 min vs 15 min–4 hrs.
#
# NIM cache:
#   Model weights are stored at NIM_CACHE_PATH (/models/nim-cache).
#   This manifest uses emptyDir — weights re-download on every run.
#   For production, replace with a PVC to persist across runs.
#
# No results-collector — check output via:
#   kubectl logs -l job-name=benchmark-nim-test-001 -c nim-server  (server)
#   kubectl logs -l job-name=benchmark-nim-test-001 -c aiperf      (results)
#
# Prerequisites:
#   - ngc-registry imagePullSecret must exist in namespace default
#   - ngc-api-key secret must exist (NIM container auth — see below)
#   - NVIDIA device plugin + nvidia-container-toolkit on GPU node
#   - K8s >= 1.29 (native sidecar restartPolicy: Always support)
#
# NGC API key secret (one-time setup):
#   kubectl create secret generic ngc-api-key \
#     --from-literal=key=<YOUR_NGC_API_KEY> \
#     --namespace default
#
# NIM image tag:
#   Verify the current pinned tag at:
#   https://catalog.ngc.nvidia.com/orgs/nim/teams/meta/containers/llama-3.1-8b-instruct
#   Update the image field below before applying.
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-nim-test-001
  namespace: default
  labels:
    app: gpu-benchmark
    job-id: "nim-test-001"
    engine: trt-llm
    gpu: rtx4000ada
  annotations:
    benchmark.akamai.com/model: "meta/llama-3.1-8b-instruct"
    benchmark.akamai.com/quantisation: "none"
    benchmark.akamai.com/submitted-by: "test"

spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 0

  template:
    metadata:
      labels:
        app: gpu-benchmark
        job-id: "nim-test-001"
        engine: trt-llm
    spec:
      restartPolicy: Never

      nodeSelector:
        nvidia.com/gpu.product: "NVIDIA-RTX-4000-Ada-Generation"

      imagePullSecrets:
        - name: ngc-registry

      volumes:
        - name: nim-cache
          emptyDir: {}       # replace with PVC for persistent model cache
        - name: results
          emptyDir: {}

      initContainers:

        # --------------------------------------------------------------------
        # Container 1 — NIM inference server (native sidecar)
        #
        # NIM is a self-contained inference microservice. The container:
        #   1. Downloads model weights from NGC on first run (cached to NIM_CACHE_PATH)
        #   2. Starts trtllm-serve automatically via its own entrypoint
        #   3. Exposes OpenAI-compatible API on port 8000
        #
        # No build step, no checkpoint conversion — this is Path A.
        #
        # IMPORTANT: Verify and pin the image tag before applying.
        # Current tag is a placeholder — check NGC catalog for latest stable.
        # --------------------------------------------------------------------
        - name: nim-server
          image: nvcr.io/nim/meta/llama-3.1-8b-instruct:1.3.3
          restartPolicy: Always

          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-key
                  key: key
            - name: NIM_CACHE_PATH
              value: /models/nim-cache

          ports:
            - name: openai
              containerPort: 8000
              protocol: TCP

          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: "16Gi"
              cpu: "4"
            limits:
              nvidia.com/gpu: "1"
              memory: "20Gi"

          volumeMounts:
            - name: nim-cache
              mountPath: /models/nim-cache

          startupProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30    # up to 5 min — first run downloads weights

          livenessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            periodSeconds: 15
            failureThreshold: 4

      containers:

        # --------------------------------------------------------------------
        # Container 2 — AIPerf benchmark
        # Waits for NIM server, runs the sweep, uploads results to S3
        # (or prints to stdout if no S3 credentials are present).
        # --------------------------------------------------------------------
        - name: aiperf
          image: python:3.13-slim

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eo pipefail

              apt-get update -qq && apt-get install -y -qq curl
              pip install --quiet --no-cache-dir aiperf==0.7.0 boto3

              echo "[aiperf] Waiting for NIM server on localhost:8000 ..."
              until curl -sf http://localhost:8000/v1/health/ready > /dev/null 2>&1; do
                echo "[aiperf] Server not ready yet — sleeping 5s"; sleep 5
              done
              echo "[aiperf] Server is healthy."

              # Start DCGM poller
              cat > /tmp/dcgm_poll.py << 'DCGM_PYEOF'
              import signal, sys, time, json, requests, os

              URL = "http://nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400/metrics"
              OUT = "/results/dcgm_metrics.json"

              count     = 0
              util_sum  = 0.0
              util_peak = 0.0
              vram_peak = 0.0

              def parse(text):
                  util = vram = None
                  for line in text.splitlines():
                      if line.startswith("DCGM_FI_DEV_GPU_UTIL{") or \
                         line.startswith("DCGM_FI_DEV_FB_USED{"):
                          parts = line.split("} ")
                          if len(parts) < 2:
                              continue
                          val = float(parts[1].split()[0])
                          if line.startswith("DCGM_FI_DEV_GPU_UTIL{"):
                              util = val
                          else:
                              vram = val
                  return util, vram

              def shutdown(sig, frame):
                  summary = {
                      "gpu_util_avg_pct":  round(util_sum / count, 1) if count else None,
                      "gpu_util_peak_pct": round(util_peak, 1)        if count else None,
                      "vram_peak_mb":      int(vram_peak)             if count else None,
                      "vram_peak_gb":      round(vram_peak / 1024, 2) if count else None,
                      "sample_count":      count,
                  }
                  with open(OUT, "w") as f:
                      json.dump(summary, f, indent=2)
                  print(f"[dcgm] summary written: {summary}")
                  sys.exit(0)

              signal.signal(signal.SIGTERM, shutdown)
              signal.signal(signal.SIGINT,  shutdown)

              print(f"[dcgm] polling {URL} every 2s")
              while True:
                  try:
                      r = requests.get(URL, timeout=3)
                      util, vram = parse(r.text)
                      if util is not None:
                          util_sum  += util
                          util_peak  = max(util_peak, util)
                      if vram is not None:
                          vram_peak  = max(vram_peak, vram)
                      count += 1
                  except Exception as e:
                      print(f"[dcgm] poll error: {e}")
                  time.sleep(2)
              DCGM_PYEOF

              python3 /tmp/dcgm_poll.py &
              DCGM_PID=$!

              echo "[aiperf] Starting benchmark."
              aiperf profile \
                --model "meta/llama-3.1-8b-instruct" \
                --url http://localhost:8000 \
                --endpoint-type chat \
                --tokenizer "meta-llama/Llama-3.1-8B-Instruct" \
                --concurrency 10 \
                --request-count 50 \
                --isl 200 \
                --osl 100 \
                --extra-inputs min_tokens:100 \
                --extra-inputs ignore_eos:true \
                --streaming \
                --use-legacy-max-tokens \
                --artifact-dir /results/artifacts \
                --profile-export-file output.json

              echo "[aiperf] Benchmark complete."
              kill -TERM $DCGM_PID
              wait $DCGM_PID || true

              # Upload only if object-storage credentials are present
              if [ -n "${S3_ENDPOINT_URL:-}" ]; then
                python3 - << 'UPLOAD_PYEOF'
              import boto3, os
              from botocore.config import Config

              s3 = boto3.client(
                  "s3",
                  endpoint_url=os.environ["S3_ENDPOINT_URL"],
                  aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
                  aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
                  config=Config(
                      signature_version="s3v4",
                      s3={"addressing_style": "path"},
                  ),
              )
              bucket = os.environ["S3_BUCKET"]
              job_id = os.environ.get("JOB_ID", "nim-test-001")
              uploads = [
                  ("/results/artifacts/output.json", f"{job_id}/aiperf.json"),
                  ("/results/dcgm_metrics.json",     f"{job_id}/dcgm_metrics.json"),
              ]
              for local, key in uploads:
                  if os.path.exists(local):
                      s3.upload_file(local, bucket, key)
                      print(f"[upload] s3://{bucket}/{key} ✓")
              UPLOAD_PYEOF
              else
                echo "[upload] No S3 credentials — skipping upload (test run)"
                echo "[aiperf] Results:"
                cat /results/artifacts/output.json || true
                echo "[dcgm] Metrics:"
                cat /results/dcgm_metrics.json || true
              fi

          env:
            - name: JOB_ID
              value: "nim-test-001"
            - name: S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: endpoint_url
                  optional: true
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: bucket
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: access_key_id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: secret_access_key
                  optional: true

          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "8Gi"

          volumeMounts:
            - name: results
              mountPath: /results
