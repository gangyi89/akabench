# =============================================================================
# TEST MANIFEST — TensorRT-LLM + AIPerf smoke test
# Deploy directly: kubectl apply -f benchmark-job-trtllm-test.yaml
#
# Model:  TinyLlama/TinyLlama-1.1B-Chat-v1.0  (~2.2 GB fp16, not gated)
# GPU:    RTX 4000 Ada Generation
# Engine: TRT-LLM Path B (HF weights → trtllm-build → trtllm-serve)
# Quant:  fp16 (no quantisation)
#
# No results-collector — check output via:
#   kubectl logs -l job-name=benchmark-test-001-trtllm -c trtllm-build  (build progress)
#   kubectl logs -l job-name=benchmark-test-001-trtllm -c trtllm-server (server logs)
#   kubectl logs -l job-name=benchmark-test-001-trtllm -c aiperf        (benchmark results)
#
# Prerequisites:
#   - ngc-registry imagePullSecret must exist in namespace default
#     (nvcr.io/nvidia/tensorrtllm-backend requires NGC auth)
#   - NVIDIA device plugin + nvidia-container-toolkit on the GPU node
#   - K8s >= 1.29 (native sidecar restartPolicy: Always support)
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-test-001-trtllm
  namespace: default
  labels:
    app: gpu-benchmark
    job-id: "test-001"
    engine: trt-llm
    gpu: rtx4000ada
  annotations:
    benchmark.akamai.com/model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    benchmark.akamai.com/quantisation: "none"
    benchmark.akamai.com/submitted-by: "test"

spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 0

  template:
    metadata:
      labels:
        app: gpu-benchmark
        job-id: "test-001"
        engine: trt-llm
    spec:
      restartPolicy: Never

      nodeSelector:
        nvidia.com/gpu.product: "NVIDIA-RTX-4000-Ada-Generation"

      # Required — nvcr.io images need NGC auth
      imagePullSecrets:
        - name: ngc-registry

      volumes:
        - name: model-cache
          emptyDir: {}       # no PVC — model downloads fresh from HF Hub each run
        - name: results
          emptyDir: {}

      initContainers:

        # --------------------------------------------------------------------
        # Container 1 — TRT-LLM engine build (standard initContainer)
        #
        # Downloads TinyLlama weights from HF Hub, converts the checkpoint,
        # then compiles the TRT-LLM engine binary.  Subsequent runs skip the
        # build if the emptyDir already has a cached engine (only within the
        # same pod lifetime; emptyDir does not persist across runs).
        # --------------------------------------------------------------------
        - name: trtllm-build
          image: nvcr.io/nvidia/tensorrt-llm/release:1.2.0

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              ENGINE_DIR="/models/trtllm-engines/tinyllama-1b-fp16-rtx4000ada"
              HF_MODEL_DIR="/models/hf-cache/TinyLlama--TinyLlama-1.1B-Chat-v1.0"

              if [ -f "${ENGINE_DIR}/config.json" ]; then
                echo "[trtllm-build] Engine cache hit. Skipping build."
                exit 0
              fi

              echo "[trtllm-build] No cached engine found. Starting build."
              mkdir -p "${ENGINE_DIR}"

              # Download weights from HF Hub if not already present
              if [ ! -d "${HF_MODEL_DIR}" ]; then
                echo "[trtllm-build] Downloading TinyLlama weights from HuggingFace Hub ..."
                huggingface-cli download TinyLlama/TinyLlama-1.1B-Chat-v1.0 \
                  --local-dir "${HF_MODEL_DIR}"
              fi

              # Step 1 — Convert HF checkpoint to TRT-LLM format
              CKPT_DIR="/tmp/trtllm-ckpt"
              mkdir -p "${CKPT_DIR}"

              python3 /app/tensorrt_llm/examples/llama/convert_checkpoint.py \
                --model_dir "${HF_MODEL_DIR}" \
                --output_dir "${CKPT_DIR}" \
                --dtype "float16"

              # Step 2 — Compile TRT-LLM engine binary
              trtllm-build \
                --checkpoint_dir "${CKPT_DIR}" \
                --output_dir "${ENGINE_DIR}" \
                --gemm_plugin "float16" \
                --max_batch_size 32 \
                --max_input_len 2048 \
                --max_seq_len 2048

              echo "[trtllm-build] Engine build complete. Saved to ${ENGINE_DIR}."

          env:
            - name: HF_HOME
              value: /models/hf-cache

          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: "8Gi"
              cpu: "2"
            limits:
              nvidia.com/gpu: "1"
              memory: "16Gi"
              cpu: "4"

          volumeMounts:
            - name: model-cache
              mountPath: /models

        # --------------------------------------------------------------------
        # Container 2 — TRT-LLM inference server (native sidecar)
        #
        # Stays running alongside the aiperf main container.
        # Requires K8s >= 1.29 for restartPolicy: Always on an initContainer.
        # --------------------------------------------------------------------
        - name: trtllm-server
          image: nvcr.io/nvidia/tensorrt-llm/release:1.2.0
          restartPolicy: Always

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              ENGINE_DIR="/models/trtllm-engines/tinyllama-1b-fp16-rtx4000ada"

              echo "[trtllm-server] Starting TRT-LLM serve from ${ENGINE_DIR} ..."

              trtllm-serve \
                --engine_dir "${ENGINE_DIR}" \
                --tokenizer "TinyLlama/TinyLlama-1.1B-Chat-v1.0" \
                --host 0.0.0.0 \
                --port 8000 \
                --max_batch_size 32 \
                --kv_cache_free_gpu_mem_fraction 0.90 \
                --use_inflight_batching

          env:
            - name: HF_HOME
              value: /models/hf-cache

          ports:
            - name: openai
              containerPort: 8000
              protocol: TCP

          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: "8Gi"
              cpu: "2"
            limits:
              nvidia.com/gpu: "1"
              memory: "16Gi"

          volumeMounts:
            - name: model-cache
              mountPath: /models

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60    # up to 10 min — engine load from emptyDir is slower than PVC

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 4

      containers:

        # --------------------------------------------------------------------
        # Container 3 — AIPerf benchmark
        # Waits for the TRT-LLM server, runs the sweep, uploads results to S3
        # (or prints to stdout if no S3 credentials are present).
        # --------------------------------------------------------------------
        - name: aiperf
          image: python:3.13-slim

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eo pipefail

              apt-get update -qq && apt-get install -y -qq curl
              pip install --quiet --no-cache-dir aiperf==0.7.0 boto3==1.35.0

              echo "[aiperf] Waiting for TRT-LLM server on localhost:8000 ..."
              until curl -sf http://localhost:8000/health > /dev/null 2>&1; do
                echo "[aiperf] Engine not ready yet — sleeping 5s"; sleep 5
              done
              echo "[aiperf] Engine is healthy."

              # Start DCGM poller
              cat > /tmp/dcgm_poll.py << 'DCGM_PYEOF'
              import signal, sys, time, json, requests, os

              URL = "http://nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400/metrics"
              OUT     = "/results/dcgm_metrics.json"

              count      = 0
              util_sum   = 0.0
              util_peak  = 0.0
              vram_peak  = 0.0

              def parse(text):
                  util = vram = None
                  for line in text.splitlines():
                      if line.startswith("DCGM_FI_DEV_GPU_UTIL{") or \
                         line.startswith("DCGM_FI_DEV_FB_USED{"):
                          parts = line.split("} ")
                          if len(parts) < 2:
                              continue
                          val = float(parts[1].split()[0])
                          if line.startswith("DCGM_FI_DEV_GPU_UTIL{"):
                              util = val
                          else:
                              vram = val
                  return util, vram

              def shutdown(sig, frame):
                  summary = {
                      "gpu_util_avg_pct":  round(util_sum / count, 1) if count else None,
                      "gpu_util_peak_pct": round(util_peak, 1)        if count else None,
                      "vram_peak_mb":      int(vram_peak)             if count else None,
                      "vram_peak_gb":      round(vram_peak / 1024, 2) if count else None,
                      "sample_count":      count,
                  }
                  with open(OUT, "w") as f:
                      json.dump(summary, f, indent=2)
                  print(f"[dcgm] summary written: {summary}")
                  sys.exit(0)

              signal.signal(signal.SIGTERM, shutdown)
              signal.signal(signal.SIGINT,  shutdown)

              print(f"[dcgm] polling {URL} every 2s")
              while True:
                  try:
                      r = requests.get(URL, timeout=3)
                      util, vram = parse(r.text)
                      if util is not None:
                          util_sum  += util
                          util_peak  = max(util_peak, util)
                      if vram is not None:
                          vram_peak  = max(vram_peak, vram)
                      count += 1
                  except Exception as e:
                      print(f"[dcgm] poll error: {e}")
                  time.sleep(2)
              DCGM_PYEOF

              python3 /tmp/dcgm_poll.py &
              DCGM_PID=$!

              echo "[aiperf] Starting benchmark."
              aiperf profile \
                --model "TinyLlama/TinyLlama-1.1B-Chat-v1.0" \
                --url http://localhost:8000 \
                --endpoint-type chat \
                --tokenizer "TinyLlama/TinyLlama-1.1B-Chat-v1.0" \
                --concurrency 10 \
                --request-count 50 \
                --isl 200 \
                --osl 100 \
                --extra-inputs min_tokens:100 \
                --extra-inputs ignore_eos:true \
                --streaming \
                --use-legacy-max-tokens \
                --artifact-dir /results/artifacts \
                --profile-export-file output.json

              echo "[aiperf] Benchmark complete."
              kill -TERM $DCGM_PID
              wait $DCGM_PID || true

              # Upload only if object-storage credentials are present
              if [ -n "${S3_ENDPOINT_URL:-}" ]; then
                python3 - << 'UPLOAD_PYEOF'
              import boto3, os, sys
              from botocore.config import Config

              s3 = boto3.client(
                  "s3",
                  endpoint_url=os.environ["S3_ENDPOINT_URL"],
                  aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
                  aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
                  config=Config(
                      signature_version="s3v4",
                      s3={"addressing_style": "path"},
                  ),
              )
              bucket  = os.environ["S3_BUCKET"]
              job_id  = os.environ.get("JOB_ID", "test-001-trtllm")
              uploads = [
                  ("/results/artifacts/output.json", f"{job_id}/aiperf.json"),
                  ("/results/dcgm_metrics.json",     f"{job_id}/dcgm_metrics.json"),
              ]
              for local, key in uploads:
                  if os.path.exists(local):
                      s3.upload_file(local, bucket, key)
                      print(f"[upload] s3://{bucket}/{key} ✓")
              UPLOAD_PYEOF
              else
                echo "[upload] No S3 credentials — skipping upload (test run)"
                echo "[aiperf] Results:"
                cat /results/artifacts/output.json || true
                echo "[dcgm] Metrics:"
                cat /results/dcgm_metrics.json || true
              fi

          env:
            - name: JOB_ID
              value: "test-001-trtllm"
            - name: S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: endpoint_url
                  optional: true
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: bucket
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: access_key_id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: secret_access_key
                  optional: true

          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "8Gi"

          volumeMounts:
            - name: results
              mountPath: /results
