# =============================================================================
# TEST MANIFEST — SGLang + AIPerf smoke test
# Deploy directly: kubectl apply -f benchmark-job-sglang-test.yaml
#
# Model:  TinyLlama/TinyLlama-1.1B-Chat-v1.0  (~2.2 GB fp16, not gated)
# GPU:    RTX 4000 Ada Generation
# Engine: SGLang — OpenAI-compatible server (python -m sglang.launch_server)
#
# How SGLang differs from vLLM:
#   - Uses RadixAttention for KV cache reuse — higher throughput on shared prefixes.
#   - FlashInfer attention backend is used by default (vs FlashAttention in vLLM).
#   - Memory budget set via --mem-fraction-static (0.0–1.0) instead of
#     --gpu-memory-utilization.
#   - Server arg is --model-path, not --model.
#   - Health endpoint: GET /health (same as vLLM).
#   - Default port is 30000; this manifest overrides to 8000 to match the other
#     test manifests.
#
# Image pinning:
#   Verify the current pinned tag at: https://hub.docker.com/r/lmsys/sglang/tags
#   The tag format is: v{version}-cu{cuda_version}  (e.g. v0.5.10-cu126)
#   Update the image field on the sglang-server initContainer before applying.
#
# No results-collector — check output via:
#   kubectl logs -l job-name=benchmark-test-001-sglang -c sglang-server
#   kubectl logs -l job-name=benchmark-test-001-sglang -c aiperf
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-test-001-sglang
  namespace: default
  labels:
    app: gpu-benchmark
    job-id: "test-001"
    engine: sglang
    gpu: rtx4000ada
  annotations:
    benchmark.akamai.com/model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    benchmark.akamai.com/quantisation: "none"
    benchmark.akamai.com/submitted-by: "test"

spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 0

  template:
    metadata:
      labels:
        app: gpu-benchmark
        job-id: "test-001"
        engine: sglang
    spec:
      restartPolicy: Never

      nodeSelector:
        nvidia.com/gpu.product: "NVIDIA-RTX-4000-Ada-Generation"

      volumes:
        - name: model-cache
          emptyDir: {}       # no PVC needed for a test — downloads fresh each run
        - name: results
          emptyDir: {}

      initContainers:

        # --------------------------------------------------------------------
        # Container 1 — SGLang inference server (native sidecar)
        #
        # Starts the SGLang OpenAI-compatible API server on port 8000.
        # TinyLlama loads in under a minute on the RTX 4000 Ada.
        #
        # IMPORTANT: Pin the image tag before applying — see header note above.
        # --------------------------------------------------------------------
        - name: sglang-server
          image: lmsysorg/sglang:v0.5.1-cu126
          restartPolicy: Always          # native sidecar — stays running

          command: ["python", "-m", "sglang.launch_server"]
          args:
            - "--model-path=TinyLlama/TinyLlama-1.1B-Chat-v1.0"
            - "--tokenizer-path=TinyLlama/TinyLlama-1.1B-Chat-v1.0"
            - "--dtype=auto"
            - "--context-length=2048"
            - "--mem-fraction-static=0.90"    # fraction of GPU memory reserved for KV cache
            - "--max-running-requests=32"      # max concurrent requests (≈ vLLM --max-num-seqs)
            - "--chunked-prefill-size=512"    # chunked prefill for long prompts
            - "--host=0.0.0.0"
            - "--port=8000"

          env:
            - name: HF_HOME
              value: /models/hf-cache

          ports:
            - name: openai
              containerPort: 8000
              protocol: TCP

          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: "8Gi"
              cpu: "2"
            limits:
              nvidia.com/gpu: "1"
              memory: "16Gi"

          volumeMounts:
            - name: model-cache
              mountPath: /models

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30    # 5 min — TinyLlama loads fast
            timeoutSeconds: 15      # SGLang /health runs a test inference pass

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 4
            timeoutSeconds: 15

      containers:

        # --------------------------------------------------------------------
        # Container 2 — AIPerf benchmark + DCGM collection + S3 upload
        # Identical structure to the vLLM test manifest.
        # --------------------------------------------------------------------
        - name: aiperf
          image: python:3.12-slim

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eo pipefail

              apt-get update -qq && apt-get install -y -qq curl
              pip install --quiet --no-cache-dir aiperf==0.7.0 boto3==1.35.0

              echo "[aiperf] Waiting for SGLang server on localhost:8000 ..."
              until curl -sf http://localhost:8000/health > /dev/null 2>&1; do
                echo "[aiperf] Engine not ready yet — sleeping 5s"; sleep 5
              done
              echo "[aiperf] Engine is healthy."

              # Start DCGM poller
              cat > /tmp/dcgm_poll.py << 'DCGM_PYEOF'
              import signal, sys, time, json, requests, os

              URL = "http://nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400/metrics"
              OUT     = "/results/dcgm_metrics.json"

              count      = 0
              util_sum   = 0.0
              util_peak  = 0.0
              vram_peak  = 0.0

              def parse(text):
                  util = vram = None
                  for line in text.splitlines():
                      if line.startswith("DCGM_FI_DEV_GPU_UTIL{") or \
                         line.startswith("DCGM_FI_DEV_FB_USED{"):
                          parts = line.split("} ")
                          if len(parts) < 2:
                              continue
                          val = float(parts[1].split()[0])
                          if line.startswith("DCGM_FI_DEV_GPU_UTIL{"):
                              util = val
                          else:
                              vram = val
                  return util, vram

              def shutdown(sig, frame):
                  summary = {
                      "gpu_util_avg_pct":  round(util_sum / count, 1) if count else None,
                      "gpu_util_peak_pct": round(util_peak, 1)        if count else None,
                      "vram_peak_mb":      int(vram_peak)             if count else None,
                      "vram_peak_gb":      round(vram_peak / 1024, 2) if count else None,
                      "sample_count":      count,
                  }
                  with open(OUT, "w") as f:
                      json.dump(summary, f, indent=2)
                  print(f"[dcgm] summary written: {summary}")
                  sys.exit(0)

              signal.signal(signal.SIGTERM, shutdown)
              signal.signal(signal.SIGINT,  shutdown)

              print(f"[dcgm] polling {URL} every 2s")
              while True:
                  try:
                      r = requests.get(URL, timeout=3)
                      util, vram = parse(r.text)
                      if util is not None:
                          util_sum  += util
                          util_peak  = max(util_peak, util)
                      if vram is not None:
                          vram_peak  = max(vram_peak, vram)
                      count += 1
                  except Exception as e:
                      print(f"[dcgm] poll error: {e}")
                  time.sleep(2)
              DCGM_PYEOF

              python3 /tmp/dcgm_poll.py &
              DCGM_PID=$!

              echo "[aiperf] Starting benchmark."
              aiperf profile \
                --model "TinyLlama/TinyLlama-1.1B-Chat-v1.0" \
                --url http://localhost:8000 \
                --endpoint-type chat \
                --tokenizer "TinyLlama/TinyLlama-1.1B-Chat-v1.0" \
                --concurrency 10 \
                --request-count 50 \
                --isl 200 \
                --osl 100 \
                --extra-inputs min_tokens:100 \
                --extra-inputs ignore_eos:true \
                --streaming \
                --use-legacy-max-tokens \
                --artifact-dir /results/artifacts \
                --profile-export-file output.json

              echo "[aiperf] Benchmark complete."
              kill -TERM $DCGM_PID
              wait $DCGM_PID || true

              # Upload only if object-storage credentials are present
              if [ -n "${S3_ENDPOINT_URL:-}" ]; then
                python3 - << 'UPLOAD_PYEOF'
              import boto3, os, sys
              from botocore.config import Config

              s3 = boto3.client(
                  "s3",
                  endpoint_url=os.environ["S3_ENDPOINT_URL"],
                  aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
                  aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
                  config=Config(
                      signature_version="s3v4",
                      s3={"addressing_style": "path"},
                  ),
              )
              bucket  = os.environ["S3_BUCKET"]
              job_id  = os.environ.get("JOB_ID", "test-001")
              uploads = [
                  ("/results/artifacts/output.json", f"{job_id}/aiperf.json"),
                  ("/results/dcgm_metrics.json",     f"{job_id}/dcgm_metrics.json"),
              ]
              for local, key in uploads:
                  if os.path.exists(local):
                      s3.upload_file(local, bucket, key)
                      print(f"[upload] s3://{bucket}/{key} ✓")
              UPLOAD_PYEOF
              else
                echo "[upload] No S3 credentials — skipping upload (test run)"
                echo "[aiperf] Results:"
                cat /results/artifacts/output.json || true
                echo "[dcgm] Metrics:"
                cat /results/dcgm_metrics.json || true
              fi

          env:
            - name: JOB_ID
              value: "sglang-test-001"
            - name: S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: endpoint_url
                  optional: true
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: bucket
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: access_key_id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: object-storage
                  key: secret_access_key
                  optional: true

          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "8Gi"

          volumeMounts:
            - name: results
              mountPath: /results
